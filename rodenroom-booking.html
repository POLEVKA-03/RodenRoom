<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RodenRoom — Бронирование</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #1a1a1f;
    --bg-secondary: #232329;
    --bg-card: #2a2a32;
    --bg-hover: #33333d;
    --text-primary: #f0f0f2;
    --text-secondary: #9a9aa8;
    --text-muted: #6b6b7a;
    --green-500: #34c759;
    --green-600: #2aad4a;
    --red-500: #e04b5a;
    --orange-500: #ff9f0a;
    --blue-500: #0a84ff;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.12);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --shadow-popup: 0 8px 40px rgba(0,0,0,0.5);
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Manrope', -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .app-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
    position: sticky; top: 0; z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #34c759, #28a745);
    border-radius: var(--radius-md);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 18px; color: #fff;
  }
  .header-title { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .header-subtitle { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
  .header-right { display: flex; align-items: center; gap: 20px; }
  .header-date { font-size: 14px; color: var(--text-secondary); font-weight: 500; text-align: right; }
  .header-clock { font-size: 36px; font-weight: 800; letter-spacing: -1.5px; font-variant-numeric: tabular-nums; }

  .app-layout { display: grid; grid-template-columns: 1fr 400px; min-height: calc(100vh - 73px); }

  .room-detail { padding: 36px 40px; overflow-y: auto; max-width: 780px; }
  .room-name-row { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
  .room-name { font-size: 32px; font-weight: 800; letter-spacing: -0.8px; }
  .room-capacity-badge {
    padding: 4px 12px; border-radius: 20px;
    background: var(--bg-card); border: 1px solid var(--border);
    font-size: 13px; font-weight: 600; color: var(--text-secondary);
  }
  .room-features { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
  .feature-tag {
    font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px;
    background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary);
    display: flex; align-items: center; gap: 5px;
  }

  .status-banner {
    border-radius: var(--radius-xl); padding: 28px; margin-bottom: 24px;
    position: relative; overflow: hidden;
  }
  .status-banner::before {
    content: ''; position: absolute; inset: 0; opacity: 0.06;
    background: radial-gradient(circle at 80% 20%, currentColor, transparent 60%);
    pointer-events: none;
  }
  .status-banner.free {
    background: linear-gradient(135deg, #1a3f28, #1a3224);
    border: 1px solid rgba(52,199,89,0.2); color: var(--green-500);
  }
  .status-banner.busy {
    background: linear-gradient(135deg, #3f1a24, #321a22);
    border: 1px solid rgba(224,75,90,0.2); color: var(--red-500);
  }
  .status-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .status-label { font-size: 24px; font-weight: 800; }
  .status-timer { font-size: 15px; color: var(--text-secondary); font-weight: 600; }

  .current-booking-info {
    margin-top: 14px; display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; background: rgba(0,0,0,0.2); border-radius: var(--radius-md);
  }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px; color: #fff; flex-shrink: 0;
  }
  .current-booking-title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .current-booking-sub { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }

  .quick-book { margin-top: 20px; }
  .quick-book-label { font-size: 13px; color: var(--text-secondary); font-weight: 600; margin-bottom: 10px; }
  .quick-book-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
  .quick-btn {
    padding: 11px 22px; border-radius: var(--radius-md);
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-primary); font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all var(--transition);
  }
  .quick-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.2); transform: translateY(-1px); }
  .quick-btn.primary { background: var(--green-500); border-color: var(--green-500); color: #fff; }
  .quick-btn.primary:hover { background: var(--green-600); }
  .quick-btn-extend {
    padding: 11px 22px; border-radius: var(--radius-md);
    background: transparent; border: 1px dashed rgba(255,255,255,0.15);
    color: var(--text-secondary); font-family: inherit; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all var(--transition);
  }
  .quick-btn-extend:hover { border-color: rgba(255,255,255,0.3); color: var(--text-primary); }

  .next-meeting {
    background: var(--bg-card); border-radius: var(--radius-lg);
    padding: 20px 22px; border: 1px solid var(--border);
  }
  .next-meeting-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .next-meeting-label { font-size: 12px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .next-meeting-time { font-size: 14px; font-weight: 700; }
  .next-meeting-body { display: flex; align-items: center; gap: 12px; }
  .meeting-title { font-size: 15px; font-weight: 700; }
  .meeting-organizer { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .attendees-row { display: flex; align-items: center; margin-left: auto; }
  .attendee-avatar {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--bg-card);
    margin-left: -8px; display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: #fff;
  }
  .attendee-avatar:first-child { margin-left: 0; }
  .attendee-count {
    width: 28px; height: 28px; border-radius: 50%; background: var(--bg-hover);
    border: 2px solid var(--bg-card); margin-left: -8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: var(--text-secondary);
  }

  .upcoming-section { margin-top: 20px; }
  .upcoming-title { font-size: 12px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .upcoming-item {
    display: flex; align-items: center; gap: 12px; padding: 12px 14px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-md); margin-bottom: 8px; transition: background var(--transition);
  }
  .upcoming-item:hover { background: var(--bg-hover); }
  .upcoming-time { font-size: 13px; font-weight: 700; color: var(--text-secondary); min-width: 100px; font-variant-numeric: tabular-nums; }
  .upcoming-name { font-size: 14px; font-weight: 600; }
  .upcoming-org { font-size: 12px; color: var(--text-secondary); }

  .timeline-panel {
    background: var(--bg-secondary); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .timeline-header {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .timeline-title { font-size: 15px; font-weight: 700; }
  .timeline-nav { display: flex; gap: 4px; }
  .timeline-nav-btn {
    height: 32px; border-radius: var(--radius-sm); background: transparent;
    border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-family: inherit; font-weight: 600;
    transition: all var(--transition); padding: 0 10px;
  }
  .timeline-nav-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
  .timeline-body { flex: 1; overflow-y: auto; position: relative; }
  .timeline-grid { position: relative; padding-bottom: 40px; }
  .time-row { display: grid; grid-template-columns: 52px 1fr; min-height: 56px; }
  .time-label { font-size: 12px; font-weight: 600; color: var(--text-muted); padding: 8px 8px 0 0; text-align: right; font-variant-numeric: tabular-nums; }
  .time-cell { border-top: 1px solid var(--border); position: relative; min-height: 56px; }
  .time-cell:hover { background: rgba(255,255,255,0.015); }
  .slot-add-btn {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    width: 26px; height: 26px; border-radius: 50%; background: transparent;
    border: 1.5px solid rgba(255,255,255,0.08); color: var(--text-muted);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 15px; transition: all var(--transition); opacity: 0;
  }
  .time-cell:hover .slot-add-btn { opacity: 1; }
  .slot-add-btn:hover { background: var(--green-500); border-color: var(--green-500); color: #fff; transform: translateY(-50%) scale(1.1); }

  .booking-block {
    position: absolute; left: 56px; right: 6px; border-radius: var(--radius-sm);
    padding: 8px 12px; z-index: 2; overflow: hidden; cursor: pointer;
    transition: transform var(--transition), box-shadow var(--transition);
  }
  .booking-block:hover { transform: scale(1.01); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
  .booking-block.occupied {
    background: linear-gradient(135deg, rgba(224,75,90,0.22), rgba(224,75,90,0.12));
    border: 1px solid rgba(224,75,90,0.25);
  }
  .booking-block.mine {
    background: linear-gradient(135deg, rgba(10,132,255,0.22), rgba(10,132,255,0.12));
    border: 1px solid rgba(10,132,255,0.25);
  }
  .booking-block-title { font-size: 12px; font-weight: 700; }
  .booking-block-org { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

  .now-indicator { position: absolute; left: 52px; right: 0; height: 2px; background: var(--green-500); z-index: 10; pointer-events: none; }
  .now-indicator::before { content: ''; position: absolute; left: -5px; top: -4px; width: 10px; height: 10px; border-radius: 50%; background: var(--green-500); }
  .now-badge { position: absolute; left: 0; top: -10px; font-size: 11px; font-weight: 700; color: var(--green-500); background: var(--bg-secondary); padding: 2px 6px; border-radius: 4px; z-index: 11; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 200; display: none; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .modal { background: var(--bg-card); border-radius: var(--radius-xl); width: 440px; max-width: 90vw; box-shadow: var(--shadow-popup); border: 1px solid var(--border-hover); animation: slideUp 0.25s ease; }
  .modal-header { padding: 24px 24px 0; display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-size: 18px; font-weight: 800; }
  .modal-close { width: 32px; height: 32px; border-radius: var(--radius-sm); background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: all var(--transition); }
  .modal-close:hover { background: var(--bg-hover); color: var(--text-primary); }
  .modal-body { padding: 20px 24px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; display: block; }
  .form-input { width: 100%; padding: 10px 14px; border-radius: var(--radius-md); background: var(--bg-primary); border: 1px solid var(--border); color: var(--text-primary); font-family: inherit; font-size: 14px; font-weight: 500; transition: border-color var(--transition); }
  .form-input:focus { outline: none; border-color: var(--green-500); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-footer { padding: 0 24px 24px; display: flex; gap: 10px; justify-content: flex-end; }
  .btn { padding: 10px 20px; border-radius: var(--radius-md); font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: all var(--transition); border: none; }
  .btn-secondary { background: var(--bg-hover); color: var(--text-secondary); }
  .btn-secondary:hover { background: rgba(255,255,255,0.12); color: var(--text-primary); }
  .btn-primary { background: var(--green-500); color: #fff; }
  .btn-primary:hover { background: var(--green-600); transform: translateY(-1px); }

  .loading-overlay { position: fixed; inset: 0; background: var(--bg-primary); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; transition: opacity 0.4s ease; }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--green-500); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--bg-card); border: 1px solid var(--green-500); border-radius: var(--radius-md); padding: 14px 24px; font-size: 14px; font-weight: 600; color: var(--green-500); z-index: 300; box-shadow: var(--shadow-popup); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); display: flex; align-items: center; gap: 8px; }
  .toast.error { border-color: var(--red-500); color: var(--red-500); }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .demo-notice { margin-top:24px;padding:12px 16px;border-radius:var(--radius-md);background:rgba(10,132,255,0.1);border:1px solid rgba(10,132,255,0.2);font-size:13px;color:var(--text-secondary); }
  .demo-notice strong { color: var(--blue-500); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  @media (max-width: 900px) {
    .app-layout { grid-template-columns: 1fr; }
    .timeline-panel { display: none; }
    .room-detail { max-width: 100%; padding: 24px 20px; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div style="font-size:14px;color:var(--text-secondary);font-weight:500">Загрузка расписания RodenRoom...</div>
</div>

<header class="app-header">
  <div class="header-left">
    <div class="header-logo">R</div>
    <div>
      <div class="header-title">RodenRoom</div>
      <div class="header-subtitle">Бронирование переговорной</div>
    </div>
  </div>
  <div class="header-right">
    <div class="header-date" id="headerDate"></div>
    <div class="header-clock" id="headerClock"></div>
  </div>
</header>

<div class="app-layout">
  <section class="room-detail" id="roomDetail"></section>
  <aside class="timeline-panel">
    <div class="timeline-header">
      <div class="timeline-title">Расписание</div>
      <div class="timeline-nav">
        <button class="timeline-nav-btn" onclick="changeDate(-1)">◀</button>
        <button class="timeline-nav-btn" onclick="changeDate(0)">Сегодня</button>
        <button class="timeline-nav-btn" onclick="changeDate(1)">▶</button>
      </div>
    </div>
    <div class="timeline-body" id="timelineBody"></div>
  </aside>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Новое бронирование</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Название встречи</label>
        <input class="form-input" id="meetingName" placeholder="Например: Стендап команды" />
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Начало</label><input class="form-input" type="time" id="meetingStart" /></div>
        <div class="form-group"><label class="form-label">Конец</label><input class="form-input" type="time" id="meetingEnd" /></div>
      </div>
      <div class="form-group">
        <label class="form-label">Описание (необязательно)</label>
        <input class="form-input" id="meetingDesc" placeholder="Тема обсуждения..." />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" id="btnConfirm" onclick="confirmBooking()">Забронировать</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastIcon">✓</span><span id="toastMsg"></span></div>

<script>
// ══════════════════════════════════════════════════════════════
//  КОНФИГУРАЦИЯ
// ══════════════════════════════════════════════════════════════
const CONFIG = {
  // ── Вебхук (для тестирования без iframe) ──
  // Разработчикам > Другое > Входящий вебхук. Права: calendar, user
  WEBHOOK_URL: '', // 'https://your.bitrix24.ru/rest/1/xxxxx/'

  START_HOUR: 8,
  END_HOUR: 20,
};

// ══════════════════════════════════════════════════════════════
//  BITRIX24 REST API LAYER
// ══════════════════════════════════════════════════════════════
class Bitrix24API {
  constructor() { this._userId = null; }

  async init() {
    if (typeof BX24 !== 'undefined') {
      return new Promise(r => BX24.init(() => { BX24.fitWindow(); r(); }));
    }
  }

  async call(method, params = {}) {
    if (typeof BX24 !== 'undefined') {
      return new Promise((resolve, reject) => {
        BX24.callMethod(method, params, res => {
          if (res.error()) reject(new Error(res.error().ex.error_description || res.error()));
          else resolve(res.data());
        });
      });
    }
    if (!CONFIG.WEBHOOK_URL) return null;
    const resp = await fetch(`${CONFIG.WEBHOOK_URL}${method}.json`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(params),
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error_description || data.error);
    return data.result;
  }

  async getUserId() {
    if (this._userId) return this._userId;
    try { const u = await this.call('user.current'); this._userId = u.ID; return u.ID; }
    catch { return 1; }
  }

  async getBookings(date) {
    const ds = fmtISO(date);
    try {
      const events = await this.call('calendar.event.get', {
        type: 'user', ownerId: await this.getUserId(),
        from: `${ds}T00:00:00`, to: `${ds}T23:59:59`,
      });
      if (!events) return null;
      const uid = this._userId;
      return events
        .filter(ev => (ev.LOCATION || '').toLowerCase().includes('rodenroom'))
        .map(ev => ({
          id: ev.ID, title: ev.NAME,
          organizer: ev.CREATED_BY_NAME || 'Сотрудник',
          startHour: toH(new Date(ev.DATE_FROM)),
          endHour: toH(new Date(ev.DATE_TO)),
          attendees: ev.ATTENDEE_LIST ? ev.ATTENDEE_LIST.length : 1,
          mine: String(ev.CREATED_BY) === String(uid),
        }));
    } catch(e) { console.error(e); return null; }
  }

  async createBooking(date, startH, endH, name, desc) {
    const ds = fmtISO(date);
    return this.call('calendar.event.add', {
      type: 'user', ownerId: await this.getUserId(),
      name: name || 'Бронирование RodenRoom',
      description: desc || '',
      from: `${ds}T${fmtH(startH)}:00`,
      to:   `${ds}T${fmtH(endH)}:00`,
      location: 'RodenRoom',
    });
  }
}

// ══════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════
function fmtH(h) { const hh=Math.floor(h), mm=Math.round((h-hh)*60); return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`; }
function fmtISO(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function toH(d) { return d.getHours()+d.getMinutes()/60; }
function initials(n) { return n.split(' ').map(w=>w[0]).join('').toUpperCase(); }
const COLORS = ['#667eea','#764ba2','#e0784b','#34c759','#ff9f0a','#af52de','#ff6b6b','#00b4d8'];
function colorFor(n) { let h=0; for(let i=0;i<n.length;i++) h=n.charCodeAt(i)+((h<<5)-h); return COLORS[Math.abs(h)%COLORS.length]; }

// ══════════════════════════════════════════════════════════════
//  DEMO DATA
// ══════════════════════════════════════════════════════════════
const PEOPLE = ['Александр Роден','Анна Петрова','Михаил Сидоров','Ольга Козлова','Дмитрий Волков','Елена Новикова'];
const NAMES = ['Ежедневный стендап','Ретро спринта','Созвон с клиентом','Планирование Q2','Дизайн-ревью','1-on-1','Демо продукта'];
function demoBookings() {
  const b=[]; let hr=9;
  for(let i=0;i<4&&hr<18;i++){
    hr+=Math.random()>0.3?0.5:0;
    const dur=[0.5,1,1.5][Math.floor(Math.random()*3)];
    const end=Math.min(hr+dur,19);
    b.push({id:'d-'+i,title:NAMES[i%NAMES.length],organizer:PEOPLE[i%PEOPLE.length],startHour:hr,endHour:end,attendees:1+Math.floor(Math.random()*5),mine:i===0});
    hr=end+(Math.random()>0.4?0.5:0);
  }
  return b;
}

// ══════════════════════════════════════════════════════════════
//  APP STATE
// ══════════════════════════════════════════════════════════════
const api = new Bitrix24API();
let bookings = [], selectedDate = new Date(), useDemo = true;

// ── Clock ──
function updateClock() { document.getElementById('headerClock').textContent = new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}); }
setInterval(updateClock,1000); updateClock();

function updateDateLabel() {
  const D=['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  const M=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const d=selectedDate;
  document.getElementById('headerDate').textContent=`${D[d.getDay()]}, ${d.getDate()} ${M[d.getMonth()]} ${d.getFullYear()}`;
}

function getStatus() {
  const nowH=toH(new Date()), sorted=[...bookings].sort((a,b)=>a.startHour-b.startHour);
  const cur=sorted.find(b=>nowH>=b.startHour&&nowH<b.endHour);
  if(cur){
    const ml=Math.round((cur.endHour-nowH)*60);
    return{status:'busy',text:`Ещё ${ml} мин до ${fmtH(cur.endHour)}`,current:cur,next:sorted.find(b=>b.startHour>=cur.endHour)};
  }
  const next=sorted.find(b=>b.startHour>nowH);
  if(next){
    const mu=Math.round((next.startHour-nowH)*60),h=Math.floor(mu/60),m=mu%60;
    return{status:'free',text:h>0?`Ещё ${h} ч ${m>0?m+' мин':''} до ${fmtH(next.startHour)}`:`Ещё ${m} мин до ${fmtH(next.startHour)}`,current:null,next,freeMin:mu};
  }
  return{status:'free',text:'Свободно до конца дня',current:null,next:null,freeMin:999};
}

function renderDetail() {
  const info=getStatus(), el=document.getElementById('roomDetail'), sc=info.status==='busy'?'busy':'free';
  let curHtml='';
  if(info.current) curHtml=`<div class="current-booking-info"><div class="avatar" style="background:${colorFor(info.current.organizer)}">${initials(info.current.organizer)}</div><div><div class="current-booking-title">${info.current.title}</div><div class="current-booking-sub">${info.current.organizer} · ${fmtH(info.current.startHour)}–${fmtH(info.current.endHour)}</div></div></div>`;
  let qb='';
  if(info.status==='free') qb=`<div class="quick-book"><div class="quick-book-label">Забронировать сейчас:</div><div class="quick-book-buttons"><button class="quick-btn primary" onclick="quickBook(15)">15 мин</button><button class="quick-btn" onclick="quickBook(30)">30 мин</button><button class="quick-btn" onclick="quickBook(60)">1 час</button><button class="quick-btn-extend" onclick="quickBookUntilNext()">До следующего бронирования ↓</button></div></div>`;
  let nextHtml='';
  if(info.next){
    const av=Array.from({length:Math.min(info.next.attendees,3)},(_,i)=>`<div class="attendee-avatar" style="background:${COLORS[i]}">${initials(PEOPLE[i%PEOPLE.length])}</div>`).join('');
    const ex=info.next.attendees>3?`<div class="attendee-count">+${info.next.attendees-3}</div>`:'';
    nextHtml=`<div class="next-meeting" style="margin-top:20px"><div class="next-meeting-header"><span class="next-meeting-label">Следующее</span><span class="next-meeting-time">${fmtH(info.next.startHour)} – ${fmtH(info.next.endHour)}</span></div><div class="next-meeting-body"><div class="avatar" style="width:40px;height:40px;font-size:15px;background:${colorFor(info.next.organizer)}">${initials(info.next.organizer)}</div><div style="flex:1"><div class="meeting-title">${info.next.title}</div><div class="meeting-organizer">${info.next.organizer}</div></div><div class="attendees-row">${av}${ex}</div></div></div>`;
  }
  const nowH=toH(new Date());
  const upcoming=[...bookings].filter(b=>b.startHour>nowH&&b!==info.next).sort((a,b)=>a.startHour-b.startHour);
  let upHtml='';
  if(upcoming.length) upHtml=`<div class="upcoming-section"><div class="upcoming-title">Позже сегодня</div>${upcoming.map(b=>`<div class="upcoming-item"><div class="upcoming-time">${fmtH(b.startHour)} – ${fmtH(b.endHour)}</div><div style="flex:1"><div class="upcoming-name">${b.title}</div><div class="upcoming-org">${b.organizer}</div></div><div class="avatar" style="width:32px;height:32px;font-size:11px;background:${colorFor(b.organizer)}">${initials(b.organizer)}</div></div>`).join('')}</div>`;
  const demo=useDemo?'<div class="demo-notice"><strong>Демо-режим</strong> — тестовые данные. Подключите Битрикс24 для реальных бронирований.</div>':'';
  el.innerHTML=`<div class="room-name-row"><div class="room-name">RodenRoom</div><div class="room-capacity-badge">👥 до 10 человек</div></div><div class="room-features"><span class="feature-tag">📺 Телевизор</span><span class="feature-tag">🎙 ВКС</span><span class="feature-tag">📋 Маркерная доска</span><span class="feature-tag">☕ Кофемашина</span></div><div class="status-banner ${sc}"><div class="status-top"><span class="status-label">${info.status==='busy'?'● Занято':'● Свободно'}</span><span class="status-timer">${info.text}</span></div>${curHtml}${qb}</div>${nextHtml}${upHtml}${demo}`;
}

function renderTimeline() {
  const body=document.getElementById('timelineBody'),SH=56,{START_HOUR:SHR,END_HOUR:EHR}=CONFIG,nowH=toH(new Date());
  let html='<div class="timeline-grid">';
  for(let h=SHR;h<EHR;h++) html+=`<div class="time-row"><div class="time-label">${fmtH(h)}</div><div class="time-cell"><button class="slot-add-btn" onclick="openModalAt(${h})">+</button></div></div>`;
  [...bookings].sort((a,b)=>a.startHour-b.startHour).forEach(b=>{
    const top=(b.startHour-SHR)*SH,height=Math.max((b.endHour-b.startHour)*SH,28);
    html+=`<div class="booking-block ${b.mine?'mine':'occupied'}" style="top:${top}px;height:${height}px"><div class="booking-block-title">${b.title}</div>${height>36?`<div class="booking-block-org">${b.organizer} · ${fmtH(b.startHour)}–${fmtH(b.endHour)}</div>`:''}</div>`;
  });
  if(nowH>=SHR&&nowH<=EHR) html+=`<div class="now-indicator" style="top:${(nowH-SHR)*SH}px"><div class="now-badge">${fmtH(nowH)}</div></div>`;
  html+='</div>'; body.innerHTML=html;
  body.scrollTop=Math.max(0,(nowH-SHR)*SH-100);
}

function renderAll(){ renderDetail(); renderTimeline(); }

async function loadData(){
  const res=await api.getBookings(selectedDate);
  if(res!==null){bookings=res;useDemo=false;}else{bookings=demoBookings();useDemo=true;}
}

function changeDate(d){ if(d===0)selectedDate=new Date();else selectedDate.setDate(selectedDate.getDate()+d); updateDateLabel(); boot(); }

async function quickBook(min){
  const nowH=toH(new Date()),endH=nowH+min/60;
  if(!useDemo){try{await api.createBooking(selectedDate,nowH,endH,'Быстрое бронирование');showToast(`Забронировано на ${min} мин`);await boot();return;}catch(e){showToast(e.message,true);return;}}
  bookings.push({id:'q-'+Date.now(),title:'Быстрое бронирование',organizer:'Вы',startHour:nowH,endHour:endH,attendees:1,mine:true});
  showToast(`Забронировано на ${min} мин`); renderAll();
}

async function quickBookUntilNext(){
  const info=getStatus(),nowH=toH(new Date()),endH=info.next?info.next.startHour:CONFIG.END_HOUR,mins=Math.round((endH-nowH)*60);
  if(!useDemo){try{await api.createBooking(selectedDate,nowH,endH,'Бронирование RodenRoom');showToast(`Забронировано на ${mins} мин`);await boot();return;}catch(e){showToast(e.message,true);return;}}
  bookings.push({id:'qu-'+Date.now(),title:'Бронирование RodenRoom',organizer:'Вы',startHour:nowH,endHour:endH,attendees:1,mine:true});
  showToast(`Забронировано на ${mins} мин`); renderAll();
}

function openModalAt(h){
  document.getElementById('meetingStart').value=fmtH(h);
  document.getElementById('meetingEnd').value=fmtH(h+1);
  document.getElementById('meetingName').value='';
  document.getElementById('meetingDesc').value='';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); }

async function confirmBooking(){
  const name=document.getElementById('meetingName').value||'Встреча',desc=document.getElementById('meetingDesc').value;
  const sp=document.getElementById('meetingStart').value.split(':'),ep=document.getElementById('meetingEnd').value.split(':');
  const sH=+sp[0]+sp[1]/60,eH=+ep[0]+ep[1]/60;
  closeModal();
  if(!useDemo){try{await api.createBooking(selectedDate,sH,eH,name,desc);showToast(`«${name}» — ${fmtH(sH)}–${fmtH(eH)}`);await boot();return;}catch(e){showToast(e.message,true);return;}}
  bookings.push({id:'c-'+Date.now(),title:name,organizer:'Вы',startHour:sH,endHour:eH,attendees:1,mine:true});
  showToast(`«${name}» — ${fmtH(sH)}–${fmtH(eH)}`); renderAll();
}

function showToast(msg,err=false){
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  document.getElementById('toastIcon').textContent=err?'✗':'✓';
  t.classList.toggle('error',err); t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}

async function boot(){
  document.getElementById('loading').classList.remove('hidden');
  await api.init(); await loadData(); updateDateLabel(); renderAll();
  setTimeout(()=>document.getElementById('loading').classList.add('hidden'),300);
}
boot();
setInterval(async()=>{await loadData();renderAll();},60000);
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
</script>
